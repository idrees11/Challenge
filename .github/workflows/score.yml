name: Score Submission

on:
  pull_request:
    paths:
      - "submissions/*.csv"
permissions:
  contents: write
jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install minimal dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      # 4️⃣ Create hidden ground truth CSV from secret
      - name: Create hidden test labels
        run: |
          echo "${{ secrets.TESTREAL }}" > data/ground_truth.csv
          echo "Ground truth first line:"
          head -1 data/ground_truth.csv

      - name: Score submissions
        run: |
          for file in submissions/*.csv; do
            SCORE=$(python scoring_script.py "$file" data/ground_truth.csv | grep SCORE | cut -d'=' -f2)
            TEAM=$(basename "$file" .csv)
            echo "$TEAM,$SCORE" >> leaderboard/leaderboard.csv
          done

      # 6️⃣ Run scoring for each submission CSV
      - name: Run scoring
        run: |
          echo "Files in submissions/:"
          ls submissions/
          for file in submissions/*.csv; do
            echo "Scoring $file"
            python scoring_script.py "$file" data/ground_truth.csv
          done

          # 6️⃣ Regenerate leaderboard.md from CSV
      - name: Render Markdown leaderboard
        run: python render_leaderboard.py

      # 7️⃣ Update leaderboard
      - name: Update leaderboard
        run: python update_leaderboard.py
      - name: Commit and push leaderboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main
          git merge ${{ github.sha }} --no-edit || true

          git add leaderboard/leaderboard.md leaderboard/leaderboard.csv
          git commit -m "Update leaderboard via workflow" || echo "No changes to commit"
          git push origin main

